<!-- 14. Styled Animated Checkbox -->

<!DOCTYPE html>
<html>
<head>
<style>
input[type=checkbox] {
    width: 20px;
    height: 20px;
    transition: transform 0.3s;
}
input[type=checkbox]:checked {
    transform: scale(1.3);
}
</style>
</head>
<body>
    <label>
        <input type="checkbox"> Accept Terms
    </label>
</body>
</html>
