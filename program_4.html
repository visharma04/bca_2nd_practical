<!-- 4. Frames Page with Links & Forms
Frames.html (save the following  code with this name)  -->
<!DOCTYPE html>
<html>
<head>
    <title>Frames Example</title>
</head>
<frameset cols="25%,75%">
    <frame src="links.html">
    <frameset rows="33%,33%,34%">
        <frame name="f1">
        <frame name="f2">
        <frame name="f3">
    </frameset>
</frameset>
</html>
Links.html (save the following code with this file name)
<a href="form1.html" target="f1">Form 1</a><br>
<a href="form2.html" target="f2">Form 2</a><br>
<a href="form3.html" target="f3">Form 3</a>
Form1.html
<form>
    Name: <input type="text">
</form>
Form2.html
<form>
    Email: <input type="email">
</form>



Form3.html
<form>
    Password: <input type="password">
</form>
