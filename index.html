<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCA Introduction to web technologies Practical Programs</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #1d2671, #c33764);
        color: white;
        min-height: 100vh;
    }

    header {
        text-align: center;
        padding: 30px 10px;
    }

    header h1 {
        font-size: 2.5rem;
        letter-spacing: 2px;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        text-align: center;
        transition: 0.3s ease;
        cursor: pointer;
        position: relative;
        overflow: hidden;
    }

    .card:hover {
        transform: translateY(-10px) scale(1.05);
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .card::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
        top: -100%;
        left: 0;
        transition: 0.5s;
    }

    .card:hover::before {
        top: 100%;
    }

    .card h2 {
        margin-bottom: 10px;
        font-size: 1.3rem;
    }

    .card a {
        text-decoration: none;
        color: #fff;
        background: #ff9800;
        padding: 8px 15px;
        border-radius: 20px;
        display: inline-block;
        margin-top: 10px;
        transition: 0.3s;
    }

    .card a:hover {
        background: #ff5722;
    }

    footer {
        text-align: center;
        padding: 15px;
        font-size: 0.9rem;
        opacity: 0.8;
    }
    .card a:nth-child(3) {
    background: #4caf50;
}

.card a:nth-child(3):hover {
    background: #2e7d32;
}
</style>

</head>
<body>

<header>
    <h1>BCA Practical Programs</h1>
    <p>Introduction to web technologies File (16 Programs)</p>
</header>

<div class="container">

    <!-- 16 Cards -->
    <script>
    for (let i = 1; i <= 16; i++) {
        document.write(`
            <div class="card">
                <h2>Program ${i}</h2>
                <p>Click below to view</p>

                <a href="program_${i}.html" target="_blank">Open</a><br><br>

                <a href="https://github.com/visharma04/bca_2nd_practical/blob/main/Program_${i}.html" 
                   target="_blank" 
                   style="background:#4caf50;"> 
                   View Source Code
                </a>
            </div>
        `);
    }
</script>

</div>

<footer>
    <p>© 2026 BCA Practical File | Designed by Vishal</p>
</footer>

</body>
</html>
