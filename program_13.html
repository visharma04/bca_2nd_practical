<!-- 13. Div & Span with Same Color Words -->

<!DOCTYPE html>
<html>
<head>
    <style>
        .same {
            color: purple;
        }
    </style>
</head>
<body>
    <div>This is <span class="same">HTML</span> language.</div>
    <div>Learning <span class="same">HTML</span> is easy.</div>
</body>
</html>
